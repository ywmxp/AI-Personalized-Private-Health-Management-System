spring:
  application:
    name: backend
  config:
    import: optional:file:../.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:${MYSQL_PORT:3306}}/${DB_NAME:${MYSQL_DATABASE:ai_health}}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:${MYSQL_USER:health_app}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:health_app_123}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 0
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-secret-key-for-ai-health-management-system}
    expire-minutes: ${JWT_EXPIRE_MINUTES:120}
